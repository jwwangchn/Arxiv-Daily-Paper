<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>arXiv Daily Paper Guide · 2026-05-10</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="eyebrow">Daily arXiv</div>
        <h1>arXiv Daily Paper Guide</h1>
        <p>自动生成的每日论文中文导读</p>
      </div>
      <label class="search-label" for="searchInput">搜索论文</label>
      <input id="searchInput" class="search-input" type="search" placeholder="title / abstract / tag / 中文导读">
      <button id="clearFilters" class="clear-button" type="button">Show all / Clear filters</button>

      <section class="nav-section">
        <h2>历史日期</h2>
        <div class="date-list"><a class="date-link active" href="daily/2026-05-10.html">2026-05-10</a></div>
      </section>
      <section class="nav-section">
        <h2>Priority</h2>
        <div class="chip-list"><button class="filter-chip priority-filter" data-filter-priority="high" type="button">high <span>0</span></button>
<button class="filter-chip priority-filter" data-filter-priority="medium" type="button">medium <span>0</span></button>
<button class="filter-chip priority-filter" data-filter-priority="low" type="button">low <span>0</span></button></div>
      </section>
      <section class="nav-section">
        <h2>论文方向分类</h2>
        <div class="chip-list"><span class="muted">暂无分类</span></div>
      </section>
      <section class="nav-section">
        <h2>Tags</h2>
        <div class="chip-list"><span class="muted">暂无 tags</span></div>
      </section>
    </aside>
    <main class="content">
      <header class="page-header">
        <div>
          <div class="eyebrow">Generated guide</div>
          <h1>2026-05-10 论文导读</h1>
          <p>0 papers · 0 tags/categories · <span id="visibleCount">0</span> visible</p>
        </div>
        <a class="data-link" href="data/dates.json">dates.json</a>
      </header>
      <div id="activeFilters" class="active-filters"></div>
      <section id="paperList" class="paper-list">
        <div class="empty-state">暂无论文数据。可以先运行 mock 模式生成预览页面。</div>
      </section>
      <div id="noResults" class="empty-state hidden">没有匹配当前筛选条件的论文。</div>
    </main>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
