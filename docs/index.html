<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>arXiv Daily Paper · 每日论文中文导读</title>
  <meta name="description" content="每日自动抓取 arXiv 论文（cs.CV / cs.AI / cs.CL / cs.LG），基于 AI 生成中文导读，包含 TL;DR、研究动机、解决问题、主要方法、实验与贡献。支持搜索、标签、分类和阅读优先级筛选。">
  <meta name="keywords" content="arXiv, 论文, AI, 机器学习, 计算机视觉, 自然语言处理, 深度学习, cs.CV, cs.AI, cs.CL, cs.LG, 每日论文, 中文导读, paper digest">
  <meta name="author" content="jwwangchn">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <link rel="canonical" href="https://jwwangchn.github.io/Arxiv-Daily-Paper/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jwwangchn.github.io/Arxiv-Daily-Paper/">
  <meta property="og:title" content="arXiv Daily Paper · 每日论文中文导读">
  <meta property="og:description" content="每日自动抓取 arXiv 论文，AI 生成中文导读。涵盖 cs.CV / cs.AI / cs.CL / cs.LG，支持搜索、标签、分类和阅读优先级筛选。">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:site_name" content="arXiv Daily Paper">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="arXiv Daily Paper · 每日论文中文导读">
  <meta name="twitter:description" content="每日自动抓取 arXiv 论文，AI 生成中文导读。涵盖 cs.CV / cs.AI / cs.CL / cs.LG。">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "arXiv Daily Paper",
    "alternateName": "arXiv 每日论文中文导读",
    "url": "https://jwwangchn.github.io/Arxiv-Daily-Paper/",
    "description": "每日自动抓取 arXiv 论文，基于 AI 生成中文导读，涵盖计算机视觉、人工智能、自然语言处理与机器学习领域。",
    "inLanguage": "zh-CN",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://jwwangchn.github.io/Arxiv-Daily-Paper/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1><span class="book-mark">&#128218;</span>arXiv Daily Paper</h1>
        <p>每日论文导读</p>
      </div>
      <input id="searchInput" class="search-input" type="search" placeholder="&#128269; 搜索标题 / 关键词...">
      <div class="stat-grid">
        <div class="stat-box"><b id="totalCount">0</b><span>论文总数</span></div>
        <div class="stat-box"><b id="dateCount">0</b><span>有论文日期</span></div>
      </div>
      <button id="clearFilters" class="clear-button" type="button">&#128218; 全部论文</button>

      <section class="nav-section">
        <h2>&#128197; 历史日期</h2>
        <div id="dateNav" class="date-nav"></div>
      </section>
      <section class="nav-section">
        <h2>&#128194; 按大类 -&gt; 小类浏览</h2>
        <div id="topicNav" class="nav-tree"></div>
      </section>
      <section class="nav-section">
        <h2>Priority</h2>
        <div id="priorityFilters" class="chip-list"></div>
      </section>
      <section class="nav-section">
        <h2>Tags</h2>
        <div id="tagFilters" class="chip-list"></div>
      </section>
    </aside>
    <main class="content">
      <header class="page-header">
        <div class="hero-copy">
          <h1>arXiv Daily Paper &middot; 中文导读</h1>
          <p>从 arXiv 自动抓取每日论文，基于标题与摘要生成中文导读；每篇论文给出 TL;DR、研究动机、解决问题、现象分析、主要方法、实验信息、贡献与局限。支持搜索、标签、分类和阅读优先级快速筛选。</p>
          <div class="hero-chips">
            <button class="hero-chip active" id="clearFiltersTop" type="button">&#128218; &#20840;&#37096;<span id="heroTotal">0</span>&#31687;</button>
            <button class="hero-chip hot" id="heroHigh" data-priority="high" type="button">&#128293; High<span id="heroHighCount">0</span>&#31687;</button>
            <span class="hero-chip soft" id="currentDateLabel">&#21152;&#36733;&#20013;</span>
          </div>
        </div>
      </header>
      <div class="count-line"><span id="visibleCount">0</span> / <span id="paperTotalInline">0</span> &#31687;&#35770;&#25991;&#21487;&#35265; <span id="activeFilters"></span></div>
      <div id="paperList"></div>
      <div id="noResults" class="empty-state hidden">&#27809;&#26377;&#21305;&#37197;&#24403;&#21069;&#31569;&#36873;&#26465;&#20214;&#30340;&#35770;&#25991;&#12290;</div>
      <div id="loadingState" class="empty-state">&#27491;&#22312;&#21152;&#36733;&#35770;&#25991;&#25968;&#25454;...</div>
      <button id="backToTop" class="back-to-top" type="button" aria-label="&#22238;&#21040;&#39030;&#37096;">&uarr; &#39030;&#37096;</button>
    </main>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
