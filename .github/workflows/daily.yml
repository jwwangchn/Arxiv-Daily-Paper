name: Daily arXiv Guide

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional single target date in YYYY-MM-DD format (default: today)"
        required: false
        type: string
      max_papers:
        description: "Optional max number of papers to fetch"
        required: false
        type: string
      concurrency:
        description: "Optional DeepSeek request concurrency, safe-capped at 4"
        required: false
        type: string
      full_export:
        description: "Export all local database records to D1 instead of only the target date"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize local database
        run: PYTHONPATH=scripts python -c "from lib.db import init_db; init_db()"

      - name: Compute target dates
        id: dates
        env:
          SINGLE_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$SINGLE_DATE" ]; then
            echo "Using single date from input: $SINGLE_DATE"
            echo "dates=[\"$SINGLE_DATE\"]" >> "$GITHUB_OUTPUT"
          else
            today=$(date -u +%F)
            echo "Using today's date: $today"
            echo "dates=[\"$today\"]" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch arXiv papers
        if: fromJSON(steps.dates.outputs.dates)[0] != null
        env:
          TARGET_DATES: ${{ steps.dates.outputs.dates }}
          REQUESTED_MAX_PAPERS: ${{ github.event.inputs.max_papers }}
        run: |
          dates=$(echo "$TARGET_DATES" | python -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          for d in $dates; do
            echo "=== Fetching papers for $d ==="
            args=(--date "$d")
            if [ -n "$REQUESTED_MAX_PAPERS" ]; then
              args+=(--max-papers "$REQUESTED_MAX_PAPERS")
            fi
            python scripts/fetch_arxiv.py "${args[@]}"
          done

      - name: Sync existing analyses from D1
        if: fromJSON(steps.dates.outputs.dates)[0] != null
        env:
          TARGET_DATES: ${{ steps.dates.outputs.dates }}
          WORKER_URL: ${{ secrets.ARXIV_DAILY_WORKER_URL }}
        run: |
          dates=$(echo "$TARGET_DATES" | python -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          PYTHONPATH=scripts python scripts/sync_remote_analyses.py --dates $dates --worker-url "$WORKER_URL"

      - name: Analyze papers with DeepSeek
        if: fromJSON(steps.dates.outputs.dates)[0] != null
        env:
          TARGET_DATES: ${{ steps.dates.outputs.dates }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_CONCURRENCY: ${{ github.event.inputs.concurrency }}
        run: |
          dates=$(echo "$TARGET_DATES" | python -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          for d in $dates; do
            echo "=== Analyzing papers for $d ==="
            args=(--date "$d")
            if [ -n "$DEEPSEEK_CONCURRENCY" ]; then
              args+=(--concurrency "$DEEPSEEK_CONCURRENCY")
            fi
            python scripts/analyze_deepseek.py "${args[@]}"
          done

      - name: Sync new data to D1 via Worker API
        env:
          WORKER_URL: ${{ secrets.ARXIV_DAILY_WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.ARXIV_DAILY_WORKER_TOKEN }}
          FULL_EXPORT: ${{ github.event.inputs.full_export }}
          TARGET_DATES: ${{ steps.dates.outputs.dates }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "WARNING: ARXIV_DAILY_WORKER_URL not set, skipping sync"
            exit 0
          fi
          if [ -z "$WORKER_TOKEN" ]; then
            echo "WARNING: ARXIV_DAILY_WORKER_TOKEN not set, skipping sync"
            exit 0
          fi
          if [ "$FULL_EXPORT" = "true" ]; then
            python scripts/export_to_worker.py --url "$WORKER_URL" --token "$WORKER_TOKEN" --full
          else
            dates=$(echo "$TARGET_DATES" | python -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
            for d in $dates; do
              echo "=== Exporting papers for $d ==="
              python scripts/export_to_worker.py --url "$WORKER_URL" --token "$WORKER_TOKEN" --date "$d"
            done
          fi
