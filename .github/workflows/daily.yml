name: Daily arXiv Guide

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional target date in YYYY-MM-DD format"
        required: false
        type: string
      max_papers:
        description: "Optional max number of papers to fetch"
        required: false
        type: string
      concurrency:
        description: "Optional DeepSeek request concurrency, safe-capped at 4"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch today's arXiv papers
        env:
          REQUESTED_DATE: ${{ github.event.inputs.date }}
          REQUESTED_MAX_PAPERS: ${{ github.event.inputs.max_papers }}
        run: |
          args=()
          if [ -n "$REQUESTED_DATE" ]; then
            args+=(--date "$REQUESTED_DATE")
          fi
          if [ -n "$REQUESTED_MAX_PAPERS" ]; then
            args+=(--max-papers "$REQUESTED_MAX_PAPERS")
          fi
          python scripts/fetch_arxiv.py "${args[@]}"

      - name: Analyze papers with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_CONCURRENCY: ${{ github.event.inputs.concurrency }}
        run: |
          args=()
          if [ -n "${{ github.event.inputs.date }}" ]; then
            args+=(--date "${{ github.event.inputs.date }}")
          fi
          if [ -n "$DEEPSEEK_CONCURRENCY" ]; then
            args+=(--concurrency "$DEEPSEEK_CONCURRENCY")
          fi
          python scripts/analyze_deepseek.py "${args[@]}"

      - name: Sync new data to Worker API
        if: ${{ secrets.WORKER_URL != '' && secrets.WORKER_TOKEN != '' }}
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: |
          python scripts/export_to_worker.py --url "$WORKER_URL" --token "$WORKER_TOKEN"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update daily arXiv guide"
            git push
          fi

      - name: Setup Node
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler and deploy Worker
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          npx wrangler deploy

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler pages deploy docs/ --project-name=arxiv-daily-paper --branch=main
